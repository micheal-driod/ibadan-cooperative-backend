services:
  - type: web
    name: ibarffs-coops-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run migrate:deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ibarffs-coops-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: ibarffs-coops-db
    plan: starter